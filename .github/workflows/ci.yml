name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy pybirdfy custom_components/birdfy
      - name: Test
        run: pytest
      - name: Private artifact scan
        run: python tools/check_no_private_artifacts.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Audit Python dependencies
        run: pip-audit --skip-editable --progress-spinner off
      - name: Scan for private camera artifacts
        run: python tools/check_no_private_artifacts.py
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2

  home-assistant-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Home Assistant test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ha-tests]"
      - name: Run Home Assistant integration tests
        run: pytest -o asyncio_mode=auto tests/test_config_flow_ha.py

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
